<!DOCTYPE html>
<html lang="en">
    <link href="css/style.css" rel="stylesheet">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSpot</title>

    <body>
    <header class="header">
                <h1>ITSpot</h1>
                <nav class="nav">
                    <ul>
                    <li><a href="#productos" >Productos</a></li>
                    <li><a href="#nosotros" >Nosotros</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                    </ul>
                </nav>
        </header>

        <main>
            <section>


                <video>
                        <source src="video/iphones.mp4" type="video/mp4" >
                </video>
            
            </section>
            
            <section id="productos">
                <h2>Productos</h2>
                <p> </p>
            </section>
            <section id="nosotros">
                <h2>Nosotros</h2>
                <p> </p>
            </section>

            <section id="#contacto">
                <h2>Contacto</h2>
                <form action="https://formspree.io/f/xojygwrg" method="POST" enctype="multipart/form-data">
                <label>Nombre:</label>
                <input type="text" name="nombre" id="nombre" placeholder="Escriba aquí su nombre">
                <br>
                <label>Email:</label>
                <input type="email" name="email" id="email" placeholder="Escriba aquí su email" >
                <br>
                <label>Teléfono:</label>
                <input type="telefono" name="telefono" id="telefono" placeholder="Escriba aquí su número telefónico">
                <br>
                <label>Consulta:</label>
                <textarea placeholder="Escriba aquí el motivo de su consulta"></textarea>
                <br>

                    <!---Botones-->
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpiar">
                </form>

            </section>
            

        </main>
        

        <footer>
            <h1>Footer</h1>

        </footer>

</body>
</html>
